name: Auto Bump Version

on:
  push:
    branches: [main]
    paths-ignore:
      - 'package.json'

jobs:
  bump:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump version to v${{ steps.bump.outputs.version }}"
          branch: bump/v${{ steps.bump.outputs.version }}
          title: "chore: bump version to v${{ steps.bump.outputs.version }}"
          body: |
            Triggered by: ${{ github.event.head_commit.message }}
            Commit: ${{ github.sha }}
